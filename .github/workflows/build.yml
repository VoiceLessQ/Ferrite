# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.
#
# Runs on windows-latest because the Rust native library targets
# x86_64-pc-windows-gnu with a hardcoded MinGW linker at
# C:/msys64/mingw64/bin/gcc.exe (see .cargo/config.toml). Windows runners
# ship with MSYS2 pre-installed at that path. The mod is Windows-only by
# design, so building on the target platform makes CI validate the
# artifact that actually ships.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'microsoft'
      - name: build
        shell: bash
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
